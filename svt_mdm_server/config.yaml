name: SVT MDM Server
version: "0.3.0"
slug: svt_mdm_server
description: Self-hosted MDM for Android (and later Windows) devices
url: https://github.com/adrianoftyriel/svt-mdm-server
arch:
  - aarch64
  - amd64
  - armv7
init: false

# Expose the dashboard through Home Assistant ingress (uses HA's own auth).
ingress: true
ingress_port: 8099
panel_icon: mdi:cellphone-lock
panel_title: SVT MDM

# Publish the API port on the host so device agents can reach /api/* directly.
# This is plain HTTP; terminate TLS with a reverse proxy before exposing it to
# the internet (see README "Exposing the device API").
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: SVT MDM device API (enrollment + telemetry) — put TLS in front

# Persist the SQLite database on the add-on data volume.
# /data is provided automatically; nothing to map here.

# Request the Mosquitto MQTT service so the Supervisor injects broker
# credentials (read in run.sh via `bashio::services mqtt`).
services:
  - mqtt:need

# Access the shared folder so backups can be written outside the add-on's
# own data volume (which is small). Default backup_dir lives here.
map:
  - share:rw

options:
  enrollment_secret: ""
  log_level: info
  mqtt_push: false
  ha_discovery: true
  dashboard_allowed_ips: ""
  backup_dir: /share/svt-mdm-backups
  backup_encryption_key: ""
schema:
  enrollment_secret: "password?"
  log_level: "list(debug|info|warning|error)?"
  mqtt_push: "bool?"
  # Expose devices to Home Assistant via MQTT discovery (Ring button etc.).
  ha_discovery: "bool?"
  # Extra source IPs allowed to reach the dashboard, in addition to HA ingress.
  # Normally leave blank; the dashboard is meant to be used via the HA panel.
  dashboard_allowed_ips: "str?"
  # Where encrypted backups are stored, and the at-rest key (passphrase).
  # Leave the key blank to auto-generate and persist one in the add-on data.
  backup_dir: "str?"
  backup_encryption_key: "password?"
